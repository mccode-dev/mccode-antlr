name: Pip

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  # Pin the McCode version whose component and library files are used in tests.
  # Bump this when a new McCode release should be adopted.
  MCCODE_VERSION: v3.5.31

jobs:
  build:
    name: Build with Pip
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOS_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

    - name: Setup MSVC compilers for testing
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build and install with testing dependencies including HDF5 and MCPL
      if: runner.os != 'Windows'
      run: pip install --verbose '.[test,hdf5,mcpl]'

    - name: Build and install with testing dependencies including HDF5 (no MCPL)
      if: runner.os == 'Windows'
      run: pip install --verbose '.[test,hdf5]'

    - name: Locate pooch cache directory
      id: pooch-cache-dir
      shell: python
      run: |
        import os, pooch
        cache = str(pooch.os_cache('mccodeantlr'))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'path={cache}\n')

    - name: Cache McCode pooch downloads
      id: cache-pooch
      uses: actions/cache@v4
      with:
        path: ${{ steps.pooch-cache-dir.outputs.path }}
        key: pooch-${{ runner.os }}-${{ env.MCCODE_VERSION }}

    - name: Pre-populate pooch cache
      if: steps.cache-pooch.outputs.cache-hit != 'true'
      run: python .github/scripts/warm_pooch_cache.py --tag ${{ env.MCCODE_VERSION }}

    - name: Test
      env:
        MCCODEANTLR_MCCODE_POOCH__TAG: ${{ env.MCCODE_VERSION }}
      run: python -m pytest -v
