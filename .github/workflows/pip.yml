name: Pip

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  # Pin the McCode repository version used for component and library files.
  # Bump this when a new McCode release should be adopted.
  MCCODE_VERSION: v3.5.31

jobs:
  build:
    name: Build with Pip
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOS_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

    - name: Setup MSVC compilers for testing
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compute McCode lib directories from pooch registry
      # Parse libc-registry.txt to derive the set of directories that need to be
      # sparse-checked-out.  Deriving this from the registry means the checkout
      # automatically tracks layout changes in the McCode repository.
      id: mccode-lib-dirs
      shell: bash
      run: |
        LIBC_DIRS=$(curl -fsSL \
          "https://raw.githubusercontent.com/mccode-dev/mccode-pooch-registries/refs/tags/${{ env.MCCODE_VERSION }}/libc-registry.txt" \
          | python3 -c "
import sys
dirs = set()
for line in sys.stdin:
    line = line.strip()
    if line and not line.startswith('#'):
        parts = line.split()
        if parts:
            parent = '/'.join(parts[0].split('/')[:-1])
            if parent:
                dirs.add(parent)
print(' '.join(sorted(dirs)))
")
        echo "dirs=${LIBC_DIRS}" >> "$GITHUB_OUTPUT"

    - name: Cache McCode repository
      id: cache-mccode
      uses: actions/cache@v4
      with:
        path: mccode-repo
        # Include the lib-dirs in the key so the cache is invalidated automatically
        # if the McCode repository layout changes between releases.
        key: mccode-${{ env.MCCODE_VERSION }}-${{ steps.mccode-lib-dirs.outputs.dirs }}

    - name: Checkout McCode ${{ env.MCCODE_VERSION }} (sparse)
      if: steps.cache-mccode.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --filter=blob:none --no-checkout --depth=1 \
          --branch "${{ env.MCCODE_VERSION }}" \
          "https://github.com/mccode-dev/McCode.git" mccode-repo
        cd mccode-repo
        git sparse-checkout init --cone
        git sparse-checkout set ${{ steps.mccode-lib-dirs.outputs.dirs }} mcstas-comps mcxtrace-comps
        git checkout HEAD

    - name: Point mccode-antlr at the local McCode clone
      # Uses bash on all platforms (including Windows via Git Bash) so that
      # $GITHUB_WORKSPACE expands consistently with forward slashes.
      shell: bash
      run: |
        MCCODE_ROOT="$GITHUB_WORKSPACE/mccode-repo"
        LIB_PATHS=""
        for dir in ${{ steps.mccode-lib-dirs.outputs.dirs }}; do
          LIB_PATHS="${LIB_PATHS}${MCCODE_ROOT}/${dir} "
        done
        echo "MCCODEANTLR_MCSTAS__PATHS=${MCCODE_ROOT}/mcstas-comps ${LIB_PATHS}" >> "$GITHUB_ENV"
        echo "MCCODEANTLR_MCXTRACE__PATHS=${MCCODE_ROOT}/mcxtrace-comps ${LIB_PATHS}" >> "$GITHUB_ENV"
        echo "MCCODEANTLR_MCCODE_POOCH__TAG=${{ env.MCCODE_VERSION }}" >> "$GITHUB_ENV"

    - name: Build and install with testing dependencies including HDF5 and MCPL
      if: runner.os != 'Windows'
      run: pip install --verbose '.[test,hdf5,mcpl]'

    - name: Build and install with testing dependencies including HDF5 (no MCPL)
      if: runner.os == 'Windows'
      run: pip install --verbose '.[test,hdf5]'

    - name: Test
      run: python -m pytest -v
