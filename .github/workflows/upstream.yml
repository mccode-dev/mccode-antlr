name: Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'


jobs:
  build:
    name: Build with Pip
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
        tag: ["v3.5.31", "latest"]
        python-version: ["3.13"]
        strategy: [".", ".[test,hdf5,mcpl]"]

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set min macOS version
      if: runner.os == 'macOS'
      run: |
        echo "MACOS_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV

    - name: Setup MSVC compilers for testing
      if: runner.os == 'Windows'
      uses: egor-tensin/vs-shell@v2

    - name: "Build and install strategy = ${{ matrix.strategy }}"
      run: |
        pip install --verbose ${{ matrix.strategy }}
        pip install --verbose pytest

    - name: Locate pooch cache directory
      id: pooch-cache-dir
      shell: python
      run: |
        import os, pooch
        from pathlib import Path
        # All mccode-antlr caches live under a single parent named 'mccodeantlr'
        # inside the OS cache dir (e.g. ~/.cache/mccodeantlr on Linux,
        # %LOCALAPPDATA%\mccodeantlr on Windows).  On Windows, pooch.os_cache()
        # uses the appdirs double-nesting convention so os_cache('mccodeantlr')
        # returns …\mccodeantlr\mccodeantlr\Cache — a *sibling* of the actual
        # registry caches, not their parent.  Walk up from any sub-registry path
        # to find the first path component named 'mccodeantlr'.
        probe = Path(pooch.os_cache('mccodeantlr/libc'))
        parts = probe.parts
        idx = next((i for i, p in enumerate(parts) if p == 'mccodeantlr'), None)
        cache = str(Path(*parts[:idx + 1])) if idx is not None else str(probe.parent)
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'path={cache}\n')

    - name: Cache McCode pooch downloads
      id: cache-pooch
      uses: actions/cache@v6
      with:
        path: ${{ steps.pooch-cache-dir.outputs.path }}
        key: pooch-${{ runner.os }}-${{ matrix.tag }}

    - name: Pre-populate pooch cache
      if: (steps.cache-pooch.outputs.cache-hit != 'true') || (matrix.tag == 'latest')
      run: mccode-antlr cache populate --tag ${{ matrix.tag }}

    - name: Test
      env:
        MCCODEANTLR_MCCODE_POOCH__TAG: ${{ matrix.tag }}
      run: python -m pytest -v -s
